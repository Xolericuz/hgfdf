<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>XOLERIC WEB BOOK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- WELCOME SCREEN -->
        <section id="welcome-screen" class="screen active">
            <div class="welcome-bg">
                <div class="grid-pattern"></div>
                <div class="glow-orb orb-1"></div>
                <div class="glow-orb orb-2"></div>
            </div>
            <div class="welcome-content">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg viewBox="0 0 60 60" fill="none">
                            <circle cx="30" cy="30" r="28" stroke="url(#logoGrad)" stroke-width="2"/>
                            <path d="M20 42L30 18L40 42" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="30" cy="18" r="4" fill="#FFB800"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="0" y1="0" x2="60" y2="60">
                                    <stop offset="0%" stop-color="#FFB800"/>
                                    <stop offset="100%" stop-color="#00F0FF"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1 class="logo-text">XOLERIC</h1>
                    <p class="logo-subtitle">WEB BOOK</p>
                </div>
                
                <div class="welcome-form">
                    <div class="input-group">
                        <input type="text" id="username" class="glass-input" placeholder="Ismingizni kiriting" autocomplete="off" maxlength="20">
                        <div class="input-line"></div>
                    </div>
                    
                    <button id="start-btn" class="btn-primary">
                        <span>KITOBXONGA KIRISH</span>
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    
                    <button id="continue-btn" class="btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M11 17L6 12L11 7M18 17L13 12L18 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M14 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>OXIRGI O'QISHNI DAVOMLASHTIRISH</span>
                    </button>
                </div>
                
                <div class="welcome-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="total-books">100</span>
                        <span class="stat-label">KITOB</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-value" id="total-words">100K+</span>
                        <span class="stat-label">SO'Z</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- LIBRARY SCREEN -->
        <section id="library-screen" class="screen">
            <header class="library-header">
                <div class="header-left">
                    <h1 class="logo">XOLERIC</h1>
                </div>
                <div class="header-right">
                    <div class="user-badge" id="user-display">
                        <div class="user-avatar"></div>
                        <span>MEHMAN</span>
                    </div>
                </div>
            </header>
            
            <div class="search-section">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 16L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Kitob qidirish...">
                    <button id="search-clear" class="search-clear hidden">&times;</button>
                </div>
            </div>
            
            <div class="categories-section">
                <div class="categories-scroll" id="category-list">
                    <button class="category-chip active" data-category="all">Barchasi</button>
                    <button class="category-chip" data-category="1">1-25</button>
                    <button class="category-chip" data-category="2">26-50</button>
                    <button class="category-chip" data-category="3">51-75</button>
                    <button class="category-chip" data-category="4">76-100</button>
                </div>
            </div>
            
            <div class="library-content">
                <div class="books-grid" id="books-grid"></div>
                <div class="empty-state hidden" id="empty-state">
                    <svg viewBox="0 0 80 80" fill="none">
                        <circle cx="40" cy="40" r="35" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4"/>
                        <path d="M30 35C30 32 33 30 40 30C47 30 50 32 50 35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="30" cy="35" r="3" fill="currentColor"/>
                        <circle cx="50" cy="35" r="3" fill="currentColor"/>
                        <path d="M28 50C28 45 32 43 40 43C48 43 52 45 52 50" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <p>Kitob topilmadi</p>
                </div>
            </div>
        </section>

        <!-- READER SCREEN -->
        <section id="reader-screen" class="screen">
            <nav class="reader-nav">
                <button id="back-btn" class="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="nav-title" id="reader-title">Kitob nomi</div>
                <button id="menu-btn" class="nav-btn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="5" r="2" fill="currentColor"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor"/>
                        <circle cx="12" cy="19" r="2" fill="currentColor"/>
                    </svg>
                </button>
            </nav>
            
            <div class="reader-content" id="reader-content">
                <div class="reader-book-header">
                    <h1 id="book-title"></h1>
                    <p id="book-author"></p>
                </div>
                <div class="reader-text" id="reader-text"></div>
                <div class="reader-footer">
                    <p class="end-mark">~ Tamom ~</p>
                </div>
            </div>
            
            <div class="player-controls">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-handle" id="progress-handle"></div>
                </div>
                <div class="controls-row">
                    <div class="time-display">
                        <span id="current-time">0:00</span>
                        <span class="time-sep">/</span>
                        <span id="total-time">0:00</span>
                    </div>
                    <div class="controls-center">
                        <button id="prev-btn" class="control-btn">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M19 20L9 12L19 4V20Z" fill="currentColor"/>
                                <rect x="6" y="4" width="2" height="16" fill="currentColor"/>
                            </svg>
                        </button>
                        <button id="play-btn" class="control-btn play-btn">
                            <svg id="play-icon" viewBox="0 0 24 24" fill="none">
                                <polygon points="6 4 20 12 6 20 6 4" fill="currentColor"/>
                            </svg>
                            <svg id="pause-icon" viewBox="0 0 24 24" fill="none" class="hidden">
                                <rect x="6" y="4" width="4" height="16" fill="currentColor"/>
                                <rect x="14" y="4" width="4" height="16" fill="currentColor"/>
                            </svg>
                        </button>
                        <button id="next-btn" class="control-btn">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M5 4L15 12L5 20V4Z" fill="currentColor"/>
                                <rect x="16" y="4" width="2" height="16" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <div class="controls-right">
                        <button id="speed-btn" class="control-btn speed-btn">
                            <span id="speed-display">1x</span>
                        </button>
                        <button id="font-btn" class="control-btn">
                            <span>Aa</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- SETTINGS PANEL -->
            <div id="settings-panel" class="panel hidden">
                <div class="panel-header">
                    <h3>Sozlamalar</h3>
                    <button id="settings-close" class="panel-close">&times;</button>
                </div>
                <div class="panel-content">
                    <div class="setting-item">
                        <label>Shrift o'lchami</label>
                        <div class="range-container">
                            <input type="range" id="font-size-slider" min="14" max="28" value="18">
                            <span id="font-size-value">18px</span>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label>O'qish tezligi</label>
                        <div class="speed-options">
                            <button class="speed-option" data-speed="0.5">0.5x</button>
                            <button class="speed-option active" data-speed="1">1x</button>
                            <button class="speed-option" data-speed="1.5">1.5x</button>
                            <button class="speed-option" data-speed="2">2x</button>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label>Tema</label>
                        <div class="theme-options">
                            <button class="theme-option active" data-theme="dark">Qora</button>
                            <button class="theme-option" data-theme="sepia">Krem</button>
                            <button class="theme-option" data-theme="light">Oq</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- BOOK MENU -->
            <div id="book-menu" class="panel hidden">
                <div class="panel-header">
                    <h3>Kitob menyusi</h3>
                    <button id="menu-close" class="panel-close">&times;</button>
                </div>
                <div class="panel-content">
                    <button class="menu-item" id="share-book">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
                            <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                            <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/>
                            <path d="M8.5 10.5L15.5 6M8.5 13.5L15.5 18" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Ulashish</span>
                    </button>
                    <button class="menu-item" id="bookmark-book">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M5 3V20L12 14L19 20V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Bobmark</span>
                    </button>
                    <button class="menu-item" id="book-info">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 8V12M12 16H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>Ma'lumot</span>
                    </button>
                </div>
            </div>
        </section>
        
        <!-- TOAST -->
        <div id="toast" class="toast"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
